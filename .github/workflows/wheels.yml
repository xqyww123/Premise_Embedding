# Build the platform wheels that carry libisabelle_vector.so.
#
# One job per architecture, each on a native runner. There is deliberately no
# cibuildwheel and no qemu here:
#
#   * cibuildwheel exists to build one wheel per CPython ABI and to run auditwheel
#     over the result. Neither applies. The library is dlopened, never imported --
#     it links no libpython and touches only stable-ABI functions -- so the wheel
#     is py3-none and a single build serves every interpreter. And Highway is
#     linked statically, so DT_NEEDED is libc.so.6 alone and there is nothing for
#     auditwheel to vendor. setup.py reads the ELF itself and refuses to emit a
#     manylinux tag the binary cannot honour, which is the only check that was
#     ever load-bearing.
#   * qemu is unnecessary now that GitHub hosts native arm64 runners. Emulating an
#     aarch64 Highway build costs tens of minutes; ubuntu-24.04-arm costs none.
#     (Free for public repositories; private repos pay per-minute.)
#
# Highway is vendored in-tree, so nothing is fetched from the network.
name: wheels

on:
  push:
    tags: ["v*"]
  pull_request:
    paths:
      - "Tools/Vector_Arith/**"
      - "setup.py"
      - "pyproject.toml"
      - ".github/workflows/wheels.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wheel:
    name: ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-24.04, arch: x86_64, lib: libisabelle_vector.so }
          - { runner: ubuntu-24.04-arm, arch: aarch64, lib: libisabelle_vector.so }
          # An Apple Silicon runner, but it builds for both architectures: Isabelle
          # runs native arm64 Poly/ML there (etc/options ML_system_apple = true) and
          # x86_64 on Intel Macs, and one fat binary serves both.
          - { runner: macos-14, arch: universal2, lib: libisabelle_vector.dylib }
          - { runner: windows-2022, arch: amd64, lib: isabelle_vector.dll }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Two toolchains, on purpose. The kernel needs MinGW: Highway marks AVX3 and
      # everything above it as HWY_BROKEN_MSVC (detect_targets.h:191), so MSVC would
      # silently drop five SIMD targets, and Poly/ML is itself a MinGW build
      # (Admin/component_polyml.scala:37). The _vecgather extension needs MSVC, which
      # is what setuptools knows how to drive and what links python3.lib. They never
      # meet: the two artifacts share no symbol, no heap and no CRT object
      # (vecgather writes only into buffers the caller allocated).
      - if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-cmake mingw-w64-x86_64-ninja
      - name: Put MinGW's binutils on PATH
        if: runner.os == 'Windows'
        # setup.py reads the kernel's PE import table with objdump, from the plain
        # shell that runs `python -m build`, not from the MSYS2 one.
        shell: msys2 {0}
        run: cygpath -w /mingw64/bin >> "$GITHUB_PATH"

      - name: Build for both macOS architectures
        if: runner.os == 'macOS'
        # Two artifacts, two switches. CMAKE_OSX_ARCHITECTURES (set in Vector_Arith's
        # CMakeLists) governs the kernel and Highway; ARCHFLAGS governs the
        # _vecgather extension module, which setuptools builds. Setting only the
        # first yields a universal2-tagged wheel whose extension module is arm64-only
        # -- it installs on an Intel Mac and dies at `import`. setup.py's
        # _check_extension_arch refuses to emit such a wheel, so this is what keeps
        # the build green rather than what keeps it honest.
        run: |
          echo 'ARCHFLAGS=-arch arm64 -arch x86_64' >> "$GITHUB_ENV"
          echo 'MACOSX_DEPLOYMENT_TARGET=11.0' >> "$GITHUB_ENV"

      - name: Build vendored Highway (static)
        if: runner.os != 'Windows'
        # Only the `hwy` target: the tests and examples are a far larger build than
        # the library, and none of them ship. Highway already forces PIC on that
        # target, which matters because the archive is linked into a shared object.
        #
        # The output must land where Tools/Vector_Arith's CMakeLists looks for it; it
        # cross-checks that the headers come from the same tree as the archive,
        # because libhwy.a owns the dispatch tables and their target numbering is not
        # stable across releases.
        #
        # hwybuild, not build: Highway's root holds a Bazel file named BUILD, and the
        # macOS runner's filesystem is case-insensitive, so `cmake -B .../build`
        # fails there with "Unable to (re)create the private pkgRedirects directory".
        #
        # On macOS the archive must be fat too, or linking the kernel fails with
        # "building for macOS-arm64 but attempting to link with file built for
        # macOS-x86_64". Highway adds no -march on x86_64/arm64, so clang's two
        # front-end passes are safe. The semicolon is a CMake list separator and must
        # survive the shell, hence the array.
        run: |
          hwy=Tools/Vector_Arith/contrib/highway-1.3.0
          osx=()
          if [ "$RUNNER_OS" = macOS ]; then
            osx=(-DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0)
          fi
          cmake -S "$hwy" -B "$hwy/hwybuild" "${osx[@]}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DHWY_ENABLE_TESTS=OFF \
            -DHWY_ENABLE_EXAMPLES=OFF \
            -DHWY_ENABLE_CONTRIB=OFF
          cmake --build "$hwy/hwybuild" --target hwy --parallel
          if [ "$RUNNER_OS" = macOS ]; then lipo -info "$hwy/hwybuild/libhwy.a"; fi

      - name: Build the kernel and run its tests
        if: runner.os != 'Windows'
        # setup.py would build the library on its own, but not the tests. Run them
        # before the wheel is packed: test_ml_dlopen is the one that catches a
        # CPython symbol creeping back into the kernel, which would break
        # Isabelle/ML's Foreign.loadLibrary at load time while leaving Python happy.
        #
        # The test binaries are thin (whatever the host is); only the shipped library
        # needs to be fat, and CMakeLists makes it so.
        run: |
          cmake -S Tools/Vector_Arith -B Tools/Vector_Arith/build -DCMAKE_BUILD_TYPE=Release
          cmake --build Tools/Vector_Arith/build --parallel
          ./Tools/Vector_Arith/build/test_gather
          ./Tools/Vector_Arith/build/test_ml_dlopen "./Tools/Vector_Arith/build/${{ matrix.lib }}"

      - name: Build Highway, the kernel and its tests (MinGW)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        # All of it inside MSYS2, with Ninja rather than the Visual Studio generator
        # cmake would otherwise pick. test_ml_dlopen exercises the LoadLibrary path
        # that Poly/ML takes on Windows (polyffi.cpp:153), which -- unlike
        # dlopen(RTLD_LAZY) -- resolves the whole import table at load, so it fails
        # here if any dependency of the kernel is missing rather than at ML load time.
        run: |
          hwy=Tools/Vector_Arith/contrib/highway-1.3.0
          cmake -S "$hwy" -B "$hwy/hwybuild" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF \
            -DHWY_ENABLE_TESTS=OFF -DHWY_ENABLE_EXAMPLES=OFF -DHWY_ENABLE_CONTRIB=OFF
          cmake --build "$hwy/hwybuild" --target hwy --parallel
          cmake -S Tools/Vector_Arith -B Tools/Vector_Arith/build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build Tools/Vector_Arith/build --parallel
          ./Tools/Vector_Arith/build/test_gather.exe
          ./Tools/Vector_Arith/build/test_ml_dlopen.exe "./Tools/Vector_Arith/build/${{ matrix.lib }}"
          # Hand the finished DLL to setup.py, which would otherwise rerun cmake from
          # the plain shell and rebuild the kernel with MSVC -- losing five SIMD targets.
          echo "ISABELLE_VECTOR_SO=$(cygpath -w "$PWD/Tools/Vector_Arith/build/${{ matrix.lib }}")" \
            >> "$GITHUB_ENV"

      - name: Report what Highway compiled in (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        # MSVC would have dropped AVX3 and above (HWY_BROKEN_MSVC, detect_targets.h:191)
        # and an old MinGW would silently drop AVX3_SPR (gcc>=12) or AVX3_DL/ZEN4
        # (gcc>=8.1) the same way, so assert the top of the range actually arrived.
        run: |
          lib=Tools/Vector_Arith/build/${{ matrix.lib }}
          targets=$(nm -C "$lib" | grep -o 'N_[A-Z0-9_]*' | sort -u | tr '\n' ' ')
          echo "targets: $targets"
          objdump -p "$lib" | grep 'DLL Name:'
          for want in N_AVX2 N_AVX3 N_AVX3_SPR N_AVX10_2; do
            case " $targets " in
              *" $want "*) ;;
              *) echo "::error::$want missing -- MinGW too old, or MSVC crept in"; exit 1 ;;
            esac
          done
          if objdump -p "$lib" | grep -Eiq 'DLL Name:.*(python|libstdc\+\+|libgcc_s|libwinpthread)'; then
            echo "::error::kernel imports a DLL that Isabelle's process may not find"; exit 1
          fi

      - name: Report what Highway compiled in
        if: runner.os != 'Windows'
        # The dispatch table is fixed at build time, per architecture. If a slice
        # shows only EMU128/SCALAR the wheel is a scalar fallback wearing a SIMD
        # name -- fail here rather than discover it by benchmark. On a fat binary
        # each slice has its own table, so each must be checked separately.
        #
        # Demangle first: the target lives in a namespace, and against a raw mangled
        # name `grep -o 'N_[A-Z0-9_]*'` runs straight on into Itanium ABI length
        # prefixes, printing N_AVX2 as "N_AVX210D".
        #
        # Apple Silicon legitimately has no SVE -- Highway disables it under
        # HWY_OS_APPLE ("No Apple CPU (at least up to and including M4 and A18) has
        # SVE", detect_targets.h:261) -- so NEON alone is the correct answer there,
        # and the gate demands only that some real SIMD target survived.
        run: |
          lib=Tools/Vector_Arith/build/${{ matrix.lib }}
          targets_of() { nm -jUC "$1" | grep -o 'N_[A-Z0-9_]*' | sort -u | tr '\n' ' '; }
          if [ "$RUNNER_OS" = macOS ]; then
            archs=$(lipo -archs "$lib")
            echo "slices: $archs"
            case "$(echo $archs | tr ' ' '\n' | sort | tr '\n' ' ')" in
              "arm64 x86_64 ") ;;
              *) echo "::error::kernel is $archs, not universal2 -- did"
                 echo "::error::CMAKE_OSX_ARCHITECTURES reach add_library()?"; exit 1 ;;
            esac
            for a in $archs; do
              lipo -thin "$a" "$lib" -output /tmp/slice.dylib
              targets=$(targets_of /tmp/slice.dylib)
              echo "  $a: ${targets:-(none)}"
              case " $targets " in
                *" N_AVX2 "*|*" N_NEON "*) ;;
                *) echo "::error::slice $a has no real SIMD target: $targets"; exit 1 ;;
              esac
            done
            otool -L "$lib" | grep -i python && { echo "::error::links Python"; exit 1; } || true
          else
            nm -C "$lib" | grep -o 'N_[A-Z0-9_]*' | sort -u | tr '\n' ' '
            echo
            objdump -p "$lib" | grep NEEDED
            objdump -T "$lib" | grep -o 'GLIBC_[0-9.]*' | sort -Vu | tail -1
          fi

      - name: Build the wheel
        shell: bash
        # --wheel, not a bare `python -m build`: the latter builds an sdist first
        # and then the wheel from inside it, and the sdist carries no Tools/ tree.
        # setup.py reuses the library built above, derives the platform tag from the
        # binary's own headers, and refuses to emit a tag it cannot back up -- an
        # ELF whose DT_NEEDED escapes the manylinux allowlist, a Mach-O missing a
        # slice, a PE importing python*.dll.
        run: |
          python -m pip install --upgrade build
          python -m build --wheel
          ls -l dist/

      - name: Check the wheel matches the runner
        shell: bash
        # The tag is what pip trusts. Both compiled artifacts must live up to it --
        # on macOS especially, where they are produced by different toolchains and
        # only the wheel itself shows whether both obeyed.
        run: |
          # The tag's architecture is the last component, after an underscore:
          # ...-manylinux_2_17_x86_64.whl, ...-macosx_11_0_universal2.whl
          test -n "$(ls dist/*_${{ matrix.arch }}.whl)"
          python - <<'PY'
          import pathlib, zipfile
          whl, = pathlib.Path("dist").glob("*.whl")
          names = zipfile.ZipFile(whl).namelist()
          for want in ("${{ matrix.lib }}", "_vecgather"):
              assert any(want in n for n in names), (want, names)
          print("ok:", whl.name)
          PY

      - name: Both artifacts are universal2
        if: runner.os == 'macOS'
        # setup.py already refuses to build an inconsistent wheel; this re-checks the
        # bytes that actually shipped, and prints them, because the failure it guards
        # against (arm64-only extension under a universal2 tag) is invisible on this
        # arm64 runner and would only surface on a user's Intel Mac.
        run: |
          python -m zipfile -e dist/*.whl /tmp/whl
          for f in /tmp/whl/Isabelle_Semantic_Embedding/libisabelle_vector.dylib \
                   /tmp/whl/Isabelle_Semantic_Embedding/_vecgather*.so; do
            archs=$(lipo -archs "$f")
            echo "$(basename "$f"): $archs"
            case "$(echo $archs | tr ' ' '\n' | sort | tr '\n' ' ')" in
              "arm64 x86_64 ") ;;
              *) echo "::error::$(basename "$f") is $archs, not universal2"; exit 1 ;;
            esac
          done

      - name: Exercise the wheel
        shell: bash
        # Everything up to here has tested the C, or the shape of the files. This
        # installs the wheel and runs the Python layer against it: that the extension
        # module imports at all, that the kernel loads through ctypes and releases the
        # GIL, that top-k reproduces a numpy reference at every buffer alignment, and
        # that quantization still approximates the cosine it claims to.
        #
        # Run from a scratch directory with the `pytest` entry point, never
        # `python -m pytest`: both the cwd and the test file's directory land on
        # sys.path, and from the checkout the source tree would shadow the wheel --
        # the suite would pass while testing something else. VECARITH_REQUIRE_INSTALLED
        # turns that from a silence into an error.
        run: |
          # The Windows job exported this so setup.py would not rebuild the kernel
          # with MSVC. It also outranks every entry in _candidate_paths(), so leaving
          # it set would test the checkout's library instead of the one in the wheel.
          unset ISABELLE_VECTOR_SO
          python -m pip install --quiet pytest numpy
          python -m pip install --quiet --no-deps dist/*.whl
          mkdir -p /tmp/vecarith-run
          cd /tmp/vecarith-run
          VECARITH_REQUIRE_INSTALLED=1 pytest -q "$GITHUB_WORKSPACE/tests/test_vecarith.py"

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.arch }}
          path: dist/*.whl
          if-no-files-found: error

  # The universal2 wheel is built on an Apple Silicon runner, where an arm64-only
  # extension module imports perfectly well. Only an Intel host can tell whether the
  # x86_64 slice is real. macos-13 is that host, and it need not build anything.
  intel-mac:
    name: universal2 on Intel
    needs: wheel
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11" # also the abi3 floor: the wheel must load here
      - uses: actions/download-artifact@v4
        with: { name: wheel-universal2, path: dist }
      - shell: bash
        run: |
          python -c "import platform; print('host:', platform.machine())"
          python -m pip install --quiet pytest numpy
          python -m pip install --quiet --no-deps dist/*.whl
          mkdir -p /tmp/vecarith-run && cd /tmp/vecarith-run
          VECARITH_REQUIRE_INSTALLED=1 pytest -q "$GITHUB_WORKSPACE/tests/test_vecarith.py"

  # The wheel says cp311-abi3: one binary for every CPython from 3.11 on. That is a
  # claim about the limited API, and it is cheap enough to test rather than assume --
  # the extension is built once, against 3.12, and must import on all of them.
  abi3:
    name: abi3 on ${{ matrix.python }}
    needs: wheel
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/download-artifact@v4
        with: { name: wheel-x86_64, path: dist }
      - shell: bash
        run: |
          python -m pip install --quiet pytest numpy
          python -m pip install --quiet --no-deps dist/*.whl
          mkdir -p /tmp/vecarith-run && cd /tmp/vecarith-run
          VECARITH_REQUIRE_INSTALLED=1 pytest -q "$GITHUB_WORKSPACE/tests/test_vecarith.py"

  # Only on a version tag, and only after every architecture has built, every wheel
  # has been exercised, and the universal2 one has proved itself on an Intel host --
  # a partial upload cannot be undone, since PyPI refuses to let a filename be
  # reused even after the release is deleted.
  #
  # There is no sdist. Building from source needs cmake, a C++17 compiler and the
  # vendored Highway tree, none of which travel in an sdist today; a `pip install`
  # that fell back to it would fail confusingly. Platforms without a wheel here get
  # a clean "no matching distribution" instead.
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [wheel, intel-mac, abi3]
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write # mints the OIDC token that PyPI trusted publishing verifies
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true

      - run: ls -l dist/

      - id: version
        shell: bash
        # v0.2.0 -> 0.2.0, for the verification job below. Expression syntax has no
        # substring function, so the tag is stripped here rather than in a `with:`.
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: pypa/gh-action-pypi-publish@release/v1

  # Everything above tested the artifacts in dist/. This tests the ones a user gets:
  # after the upload, through PyPI's index, with pip choosing which of the four
  # wheels the host deserves. The same workflow runs weekly on its own, so a new
  # CPython or a refreshed runner image cannot rot a published wheel unnoticed.
  #
  # The version is pinned rather than left to "latest", so that a release running
  # concurrently cannot make this pass for an artifact it never tested.
  verify-published:
    needs: publish
    uses: ./.github/workflows/verify-pypi.yml
    with:
      version: ${{ needs.publish.outputs.version }}
